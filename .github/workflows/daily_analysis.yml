name: 每日热点板块分析

on:
  schedule:
    - cron: '35 1 * * 1-5'   # 北京时间 09:35
    - cron: '35 2 * * 1-5'   # 北京时间 10:35
    - cron: '20 3 * * 1-5'   # 北京时间 11:20
    - cron: '5 5 * * 1-5'    # 北京时间 13:05
    - cron: '5 6 * * 1-5'    # 北京时间 14:05
    - cron: '55 6 * * 1-5'   # 北京时间 14:55

  workflow_dispatch:

concurrency:
  group: hot-board-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 随机延迟（避免固定时间访问）
        run: sleep $((RANDOM % 60))

      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pywencai

      - name: 创建必要目录
        run: |
          mkdir -p data logs reports

      - name: 执行热点板块分析
        env:
          # 问财 Cookie
          WENCAI_COOKIE: ${{ secrets.WENCAI_COOKIE }}

          # 邮件配置
          EMAIL_SENDER: ${{ vars.EMAIL_SENDER || secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ vars.EMAIL_RECEIVERS || secrets.EMAIL_RECEIVERS }}
          EMAIL_SENDER_NAME: ${{ vars.EMAIL_SENDER_NAME || secrets.EMAIL_SENDER_NAME || 'daily_stock_analysis股票分析助手' }}

          # 系统配置
          LOG_LEVEL: INFO
        run: |
          echo "=========================================="
          echo "🔥 A股热点板块分析任务"
          echo "=========================================="
          echo "⏰ 时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo ""
          echo "=========================================="
          echo "📋 配置检查"
          echo "=========================================="
          echo "  WENCAI_COOKIE: $([ -n "$WENCAI_COOKIE" ] && echo '✅ 已配置' || echo '❌ 未配置')"
          echo "  EMAIL_SENDER: $([ -n "$EMAIL_SENDER" ] && echo '✅ 已配置' || echo '❌ 未配置')"
          echo "  EMAIL_PASSWORD: $([ -n "$EMAIL_PASSWORD" ] && echo '✅ 已配置' || echo '❌ 未配置')"
          echo "  EMAIL_RECEIVERS: $([ -n "$EMAIL_RECEIVERS" ] && echo '✅ 已配置' || echo '❌ 未配置')"
          echo "=========================================="
          echo ""

          python main.py

      - name: 上传分析报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hot-board-reports-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30

      - name: 显示运行结果
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "📊 分析完成"
          echo "=========================================="
          if [ -d "reports" ] && [ "$(ls -A reports 2>/dev/null)" ]; then
            echo "生成的报告:"
            ls -la reports/
          else
            echo "⚠️ 未生成报告文件"
          fi
          echo ""
          if [ -d "logs" ] && [ "$(ls -A logs 2>/dev/null)" ]; then
            echo "📜 最近日志（最后 30 行）:"
            tail -30 logs/* 2>/dev/null || echo "无日志"
          fi
